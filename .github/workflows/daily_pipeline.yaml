name: Daily ArXiv Digest — Tribedy/STAR

on:
  schedule:
    # Mon–Fri at 18:30 UTC = 14:30 ET (right after arXiv posts daily listings)
    - cron: '30 18 * * 1-5'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 sendgrid lxml pyyaml

      - name: Restore seen-papers cache
        uses: actions/cache@v4
        with:
          path: /tmp/seen_papers.json
          key: seen-papers-${{ github.run_id }}
          restore-keys: seen-papers-

      - name: Run digest
        run: python digest.py
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL:       ${{ secrets.FROM_EMAIL }}
          TO_EMAIL:         ${{ secrets.TO_EMAIL }}
          SEEN_CACHE_PATH:  /tmp/seen_papers.json

      - name: Save seen-papers cache
        uses: actions/cache@v4
        if: always()
        with:
          path: /tmp/seen_papers.json
          key: seen-papers-${{ github.run_id }}
