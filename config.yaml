# ── Research interests of Prithwish Tribedy (BNL/STAR) ──────────────────────
# Derived from: Google Scholar profile, INSPIRE record, thesis, and recent papers
interest: |
  I am Prithwish Tribedy, an Associate Physicist at Brookhaven National Laboratory
  and active member of the STAR experiment at RHIC. My research spans:

  PRIMARY TOPICS (highest priority):
  - Ultra-peripheral collisions (UPC): coherent and incoherent J/psi and Upsilon
    photoproduction; Breit-Wheeler pair production; linearly polarized photon
    azimuthal distributions; electromagnetic fields in heavy-ion collisions
  - Baryon transport and stopping: gluon junctions (Y-topology), net-baryon
    rapidity distributions, baryon number stopping vs. quark transport;
    photonuclear baryon junction searches; isobar comparisons
  - Chiral Magnetic Effect (CME) and isobar blind analysis: charge separation,
    three-particle correlators, reaction-plane correlators, background separation
  - Event-shape engineering (ESE): ESE-tagged flow, q-vector selection,
    non-linear mode coupling between v_n harmonics
  - Flow fluctuations: v2, v3, v4; eccentricity fluctuations; cumulants; 
    longitudinal flow-plane decorrelation; multiplane cumulants; linear response
    coefficients; non-linear hydro response

  SECONDARY TOPICS (medium priority):
  - IP-Glasma / Color Glass Condensate (CGC) initial-state models: IP-Sat,
    b-CGC, rcBK, Glasma flux tubes, gluon saturation, JIMWLK evolution
  - Small-system collectivity: p+p, p+A, d+A ridge; azimuthal anisotropy
    from initial-state vs. final-state (hydro); proton shape fluctuations
  - QCD critical point and BES-II: net-proton / net-charge / net-kaon 
    fluctuations and higher-order cumulants; beam energy scan
  - Heavy flavor at RHIC/EIC: J/psi, Upsilon suppression and production;
    open charm; unified framework for heavy flavor in high-multiplicity events
  - Directed flow (v1): electromagnetic-field effects on constituent quarks;
    charge/strangeness-dependent v1 splitting; baryon/charge stopping connection
  - Nuclear deformation and imaging: U+U, isobar (Ru+Ru, Zr+Zr) geometry;
    nuclear skin; imaging nuclear shapes via flow observables
  - EIC physics: saturation at EIC; baryon junction signatures in e+A; 
    forward physics and detector requirements
  - Hyperon global polarization and spin alignment (STAR context)
  - Femtoscopy / HBT and light-nuclei correlations

  I want papers that are:
  (a) Genuinely new results — not proceedings summaries of known results
  (b) Directly testable with or compared to STAR/RHIC/sPHENIX data
  (c) From close collaborators (see collaborators section below)
  (d) Unusually influential (high early citation rate)

threshold: 5

