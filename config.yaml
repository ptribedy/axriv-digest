interest: |
  I am a STAR Experiment physicist at BNL working on STAR-era RHIC analyses.
  My primary interests are:
  - Ultra-peripheral collisions (UPC) and coherent/incoherent J/psi photoproduction
  - Event-shape engineering (ESE) and its effect on flow observables
  - Flow fluctuations: v_n coefficients, eccentricity, cumulants, non-linear mode coupling
  - Photonuclear interactions, Pomeron exchange, nuclear shadowing
  I want to know about genuinely new results, unusually influential papers, or anything
  that directly overlaps STAR UPC / J/psi photoproduction / ESE / flow-fluctuation analyses.

